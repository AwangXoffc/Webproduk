<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta property="og:title" content="Awang OfficiaL - Customer Service">
    <meta property="og:description" content="Pusat Kebutuhan Digital Terpercaya">
    <meta property="og:image" content="assets/images/profile.jpg">
    <meta property="og:url" content="https://awangofc.my.id/chat">
    <meta property="og:type" content="website">
    <title id="page-title">Awang OfficiaL - Customer Service</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preload" href="assets/images/profile.jpg" as="image" fetchpriority="high">
</head>
<body class="chat-app-body" style="margin: 0; padding: 0; background-color: #f8f9fa; overflow: hidden; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">

    <div id="page-loader" class="page-loader">
        <div class="loader-content">
            <div class="spinner"></div>
            <h2>Awang OfficiaL</h2>
            <p>Menghubungkan ke Customer Service...</p>
        </div>
    </div>
    <script>if(sessionStorage.getItem('awangMarketLoaded')){document.getElementById('page-loader').style.display='none';}</script>

    <main class="chat-fullscreen-container" style="height: 100dvh; display: flex; flex-direction: column;">
        
        <div class="chat-app-header" style="background: linear-gradient(135deg, #343a40 0%, #121212 100%); color: #fff; padding: 15px 20px; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 20px rgba(52, 58, 64, 0.2); z-index: 10; padding-top: max(15px, env(safe-area-inset-top));">
            <button class="chat-back-btn" onclick="window.location.href='/'" style="background: rgba(255,255,255,0.1); border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: background 0.3s;">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="chat-header-title" style="display: flex; align-items: center; gap: 12px; flex-grow: 1;">
                <div style="width: 45px; height: 45px; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                    <i class="fas fa-headset"></i>
                </div>
                <div class="title-text">
                    <h3 style="font-size: 17px; font-weight: 800; margin: 0; line-height: 1.2; letter-spacing: 0.5px;">Vivi - Customer Service</h3>
                    <p style="font-size: 12px; margin: 0; opacity: 0.9; display: flex; align-items: center; gap: 5px;">
                        <span style="display: inline-block; width: 8px; height: 8px; background: #25d366; border-radius: 50%; box-shadow: 0 0 5px #25d366;"></span> Online
                    </p>
                </div>
            </div>
        </div>
        
        <div id="chat-messages" class="chat-messages-area" style="flex: 1; overflow-y: auto; padding: 25px 20px; display: flex; flex-direction: column; gap: 18px; scroll-behavior: smooth; background-image: radial-gradient(#e2e8f0 1px, transparent 1px); background-size: 20px 20px;">
            <div class="chat-msg chat-msg-ai" style="align-self: flex-start; max-width: 85%; animation: fadeIn 0.3s ease-out;">
                <div style="display: flex; gap: 10px; align-items: flex-end;">
                    <div style="width: 30px; height: 30px; background: #343a40; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 12px; flex-shrink: 0; box-shadow: 0 2px 5px rgba(52, 58, 64, 0.2);">
                        <i class="fas fa-headset"></i>
                    </div>
                    <div class="msg-bubble" style="background: #fafafa; color: #2d3748; padding: 14px 18px; border-radius: 20px; border-bottom-left-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); font-size: 14px; line-height: 1.6; border: 1px solid #edf2f7;">
                        Halo, kak! Selamat datang di Awang OfficiaL 👋 Saya Vivi, tim Customer Service yang siap membantu kakak. Ada yang bisa Vivi bantu untuk kebutuhan layanan digitalnya hari ini?
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-input-wrapper" style="background: #fafafa; padding: 12px 20px; padding-bottom: max(15px, env(safe-area-inset-bottom)); border-top: 1px solid #e2e8f0; z-index: 10; box-shadow: 0 -4px 20px rgba(0,0,0,0.02);">
            <form id="chat-form" class="chat-input-form" style="display: flex; gap: 12px; align-items: center; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 30px; padding: 6px 6px 6px 20px; transition: all 0.3s ease; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);">
                <input type="text" id="chat-input" placeholder="Ketik pesan Anda di sini..." autocomplete="off" required style="flex: 1; border: none; background: transparent; outline: none; font-size: 15px; padding: 10px 0; color: #2d3748;">
                <button type="submit" title="Kirim Pesan" style="background: linear-gradient(135deg, #343a40 0%, #121212 100%); color: #fff; border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 16px; cursor: pointer; flex-shrink: 0; box-shadow: 0 4px 10px rgba(52, 58, 64, 0.3); transition: transform 0.2s;">
                    <i class="fas fa-paper-plane" style="margin-left: -2px; margin-top: 2px;"></i>
                </button>
            </form>
        </div>

    </main>

    <script src="config.js"></script>
    <script src="main.js"></script>
</body>
</html>
